# Cargo Configuration — Cross-Platform Targets
# See: https://doc.rust-lang.org/cargo/reference/config.html

[build]
# Default target is host (macOS arm64)
# Use --target to override:
#   cargo build --target x86_64-pc-windows-msvc   (Windows 10 Pro)

[target.x86_64-pc-windows-msvc]
# Windows 10 Pro target (Intel Xeon E3 + Nvidia 5000)
# Build natively on Windows with: cargo build
# Cross-compile: requires MSVC linker (not supported on macOS)

[target.aarch64-apple-darwin]
# macOS target (Apple M4 Max)

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
